<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Inventario App</title>
    
    <!-- DNS prefetch y preconnect para APIs y CDN -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    
    <!-- Fuentes optimizadas: load-async para no bloquear render -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Bootstrap (si es necesario, mejor loadear en JS lazy) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" media="print" onload="this.media='all'" />
    
    <!-- PDF.js (lazy load en on-demand) -->
    <!-- <script async src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script> -->
    <!-- Mammoth (lazy load en on-demand) -->
    <!-- <script async src="https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js"></script> -->
    
    <!-- Preload critical resources para app shell -->
    <link rel="preload" href="/src/main.js" as="script" />
    
    <!-- Performance: reduce paint time con color metadata -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="dark" />
    
  </head>
  <body style="background:#0f172a;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Source Sans 3',sans-serif;">
    <div id="app" style="min-height:100vh;"></div>
    <script type="module" src="/src/main.js"></script>
    
    <!-- Lazy load PDF.js only when needed (intersection observer in Vue) -->
    <script>
      window.__PDF_WORKER__ = () => {
        if (!window.pdfjsLib) {
          const script = document.createElement('script');
          script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
          document.head.appendChild(script);
        }
      };
    </script>
  </body>
  </html>
